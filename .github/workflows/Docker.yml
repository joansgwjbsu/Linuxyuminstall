name: Docker

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

jobs:
  sync:
    name: Pull and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Login Aliyun ACR
        run: |
          echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" \
            --username "$ACR_USERNAME" \
            --password-stdin

      - name: Pull and push images
        run: |
          set -e

          while read line; do
            [ -z "$line" ] && continue

            docker pull "$line"

            image_name_tag=$(echo "$line" | awk -F'/' '{print $NF}')
            new_image="$ACR_REGISTRY/$ACR_NAMESPACE/$image_name_tag"

            docker tag "$line" "$new_image"
            docker push "$new_image"
          done < images.txt
